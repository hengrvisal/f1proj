services:
  db:
    image: pgvector/pgvector:pg16
    container_name: f1db
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
      POSTGRES_DB: f1db
    ports:
      - "5432:5432"
    volumes:
      - f1_pgdata:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: f1mlflow
    ports:
      - "5000:5000"
    volumes:
      - f1_mlflow:/mlflow
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts

  pgadmin:
    image: dpage/pgadmin4
    container_name: f1pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  f1_pgdata:
  f1_mlflow:
